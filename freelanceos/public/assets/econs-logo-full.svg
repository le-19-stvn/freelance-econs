<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Blue ambient glow -->
    <radialGradient id="fGlowBL" cx="0%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#00A3FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00A3FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fGlowBR" cx="100%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#0057FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0057FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Chrome metallic -->
    <linearGradient id="fChrome" x1="0" y1="10" x2="0" y2="90">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="25%" stop-color="#E8E8E8"/>
      <stop offset="50%" stop-color="#B8B8B8"/>
      <stop offset="72%" stop-color="#8E8E8E"/>
      <stop offset="100%" stop-color="#C8C8C8"/>
    </linearGradient>
    <!-- Chrome for wordmark -->
    <linearGradient id="fChromeWord" x1="0" y1="20" x2="0" y2="80">
      <stop offset="0%" stop-color="#EDEDED"/>
      <stop offset="40%" stop-color="#C8C8C8"/>
      <stop offset="70%" stop-color="#959595"/>
      <stop offset="100%" stop-color="#B5B5B5"/>
    </linearGradient>
  </defs>

  <!-- Icon box -->
  <rect x="0" y="4" width="92" height="92" rx="20" fill="#08080E"/>
  <rect x="0" y="4" width="92" height="92" rx="20" fill="url(#fGlowBL)"/>
  <rect x="0" y="4" width="92" height="92" rx="20" fill="url(#fGlowBR)"/>

  <!-- "eC" in icon -->
  <text x="46" y="70" text-anchor="middle" fill="url(#fChrome)" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif" font-weight="800" font-size="52" letter-spacing="-3">eC</text>

  <!-- "eCons" wordmark -->
  <text x="118" y="72" fill="url(#fChromeWord)" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" font-size="52" letter-spacing="-2">eCons</text>
</svg>
